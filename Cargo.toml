  "crates/peregrine-sui-indexer",
  "crates/peregrine-sui-import-engine",
  "crates/peregrine-sui-move-graph",
  "crates/peregrine-sui-move-insights",
  "crates/peregrine-sui-move-model",
  "crates/peregrine-sui-move-analyzer",
  "crates/peregrine-sui-mcp-protocol",
  "crates/peregrine-sui-move-analyzer-mcp-protocol",
  "crates/peregrine-mcp-client",
  "crates/peregrine-mcp-server/sui",
  "crates/peregrine-mcp-server/sui-move-analyzer",
  "crates/peregrine-memwal",
  "crates/peregrine-sui-package-resolution",
  "crates/peregrine-sui-project-loader",
  "crates/peregrine-plugins",
  "crates/peregrine-sui-scanner",
  "crates/peregrine-sui-static-analysis",
  "crates/peregrine-terminal",
  "crates/peregrine-tui",
  "crates/peregrine-types",
  "crates/peregrine-core",
  "crates/peregrine-skills",
  "crates/memories/read",
  "crates/peregrine-client",
  "crates/peregrine-config",
  "crates/peregrine-app-server-types",
  "crates/peregrine-api",
  "crates/peregrine-model-provider",
  "crates/peregrine-anthropic",
  "crates/peregrine-provider-registry",
  "crates/peregrine-app-server",
  "crates/peregrine-app-server-client",
  "crates/peregrine-app-server-daemon",
  "crates/peregrine-app-server-protocol",
  "crates/peregrine-app-server-test-client",
  "crates/peregrine-app-server-transport",
  "crates/memories/write",
  "crates/peregrine-utils/home-dir",
  "crates/peregrine-core/tests/common",
  "crates/peregrine-app-server/tests/common",
]
resolver = "2"

[workspace.package]
version = "0.1.0"
edition = "2024"
license = "Apache-2.0"

[workspace.lints]
rust = {}

[workspace.lints.clippy]
await_holding_invalid_type = "deny"
await_holding_lock = "deny"
expect_used = "deny"
identity_op = "deny"
manual_clamp = "deny"
manual_filter = "deny"
manual_find = "deny"
manual_flatten = "deny"
manual_map = "deny"
manual_memcpy = "deny"
manual_non_exhaustive = "deny"
manual_ok_or = "deny"
manual_range_contains = "deny"
manual_retain = "deny"
manual_strip = "deny"
manual_try_fold = "deny"
manual_unwrap_or = "deny"
needless_borrow = "deny"
needless_borrowed_reference = "deny"
needless_collect = "deny"
needless_late_init = "deny"
needless_option_as_deref = "deny"
needless_question_mark = "deny"
needless_update = "deny"
redundant_clone = "deny"
redundant_closure = "deny"
redundant_closure_for_method_calls = "deny"
redundant_static_lifetimes = "deny"
trivially_copy_pass_by_ref = "deny"
uninlined_format_args = "deny"
unnecessary_filter_map = "deny"
unnecessary_lazy_evaluations = "deny"
unnecessary_sort_by = "deny"
unnecessary_to_owned = "deny"
unwrap_used = "deny"

