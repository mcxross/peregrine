[workspace]
members = [
  "src-tauri",
  "crates/peregrine-analysis-core",
  "crates/peregrine-attack-surface",
  "crates/peregrine-complexity-rules",
  "crates/peregrine-move-model",
  "crates/peregrine-object-lifecycle",
  "crates/peregrine-static-analysis",
]
resolver = "2"

[workspace.package]
version = "0.1.0"
edition = "2021"

[workspace.dependencies]
base64 = "0.22"
globset = "0.4"
move-command-line-common = { git = "https://github.com/mcxross/sui", branch = "testnet" }
move-compiler = { git = "https://github.com/mcxross/sui", branch = "testnet" }
peregrine-analysis-core = { path = "crates/peregrine-analysis-core" }
peregrine-attack-surface = { path = "crates/peregrine-attack-surface" }
peregrine-complexity-rules = { path = "crates/peregrine-complexity-rules" }
peregrine-move-model = { path = "crates/peregrine-move-model" }
peregrine-object-lifecycle = { path = "crates/peregrine-object-lifecycle" }
peregrine-static-analysis = { path = "crates/peregrine-static-analysis" }
pulldown-cmark = "0.12"
reqwest = { version = "0.13.2", default-features = false }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
syntect = { version = "5", default-features = false, features = ["default-fancy"] }
tauri = { version = "2", features = [] }
tauri-build = { version = "2", features = [] }
tauri-plugin-dialog = "2"
tauri-plugin-opener = "2"
tempfile = "3"
toml = "0.8"
walkdir = "2"
wasmtime = "28"
wat = "1"
