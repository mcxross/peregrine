[workspace]
members = [
  "src-tauri",
  "crates/peregrine-analysis",
  "crates/peregrine-analysis-engine",
  "crates/peregrine-audit-store",
  "crates/peregrine-security-tools",
  "crates/peregrine-sui-adapter",
