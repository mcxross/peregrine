name: Release

on:
  push:
    tags:
      - 'v*'

env:
  CARGO_TERM_COLOR: always

jobs:
  build-and-release:
    name: Build and Release CLI/TUI
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        include:
          - os: ubuntu-latest
            artifact_name: peregrine-tui-linux-x86_64
          - os: macos-latest
            artifact_name: peregrine-tui-macos-x86_64
          - os: windows-latest
            artifact_name: peregrine-tui-windows-x86_64

    runs-on: ${{ matrix.os }}
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Cache dependencies
        uses: Swatinem/rust-cache@v2

      - name: Install Bun dependencies
        run: bun install

      - name: Build TUI and Sidecars
        # This script builds all sidecars + the TUI and prepares them
        run: bun run build:tui

      - name: Build App Server
        run: cargo build --release -p peregrine-app-server

      - name: Package Release
        shell: bash
        run: |
          mkdir peregrine-tui-release
          if [ "${{ matrix.os }}" = "windows-latest" ]; then
            cp target/release/peregrine-tui.exe peregrine-tui-release/
            cp target/release/peregrine-app-server.exe peregrine-tui-release/
            cp target/release/peregrine-helper.exe peregrine-tui-release/
            cp target/release/peregrine-sui-mcp-server.exe peregrine-tui-release/
            cp target/release/peregrine-sui-move-analyzer-mcp-server.exe peregrine-tui-release/
            cd peregrine-tui-release
            7z a ../${{ matrix.artifact_name }}.zip *
            cd ..
            sha256sum ${{ matrix.artifact_name }}.zip > ${{ matrix.artifact_name }}.zip.sha256
          else
            cp target/release/peregrine-tui peregrine-tui-release/
            cp target/release/peregrine-app-server peregrine-tui-release/
            cp target/release/peregrine-helper peregrine-tui-release/
            cp target/release/peregrine-sui-mcp-server peregrine-tui-release/
            cp target/release/peregrine-sui-move-analyzer-mcp-server peregrine-tui-release/
            cd peregrine-tui-release
            tar -czvf ../${{ matrix.artifact_name }}.tar.gz *
            cd ..
            if command -v sha256sum >/dev/null 2>&1; then
              sha256sum ${{ matrix.artifact_name }}.tar.gz > ${{ matrix.artifact_name }}.tar.gz.sha256
            else
              shasum -a 256 ${{ matrix.artifact_name }}.tar.gz > ${{ matrix.artifact_name }}.tar.gz.sha256
            fi
          fi

      - name: Upload Release Asset
        uses: softprops/action-gh-release@v2
        with:
          files: |
            *.zip
            *.tar.gz
            *.sha256
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
