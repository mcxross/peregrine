name: PR Checks

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

env:
  CARGO_TERM_COLOR: always

jobs:
  check-and-test:
    name: Check, Test, and Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install System Dependencies (Ubuntu)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y z3 libz3-dev libwebkit2gtk-4.1-dev build-essential curl wget file libxdo-dev libssl-dev libayatana-appindicator3-dev librsvg2-dev

      - name: Cache dependencies
        uses: Swatinem/rust-cache@v2

      - name: Install Bun dependencies
        run: bun install

      - name: Check Formatting
        run: cargo fmt --check

      - name: Prepare Sidecars and Build TUI
        run: bun scripts/prepare-sidecars.ts --include-tui

      - name: Lint with Clippy
        run: cargo clippy --workspace -- -D warnings

      - name: Install cargo-nextest
        uses: taiki-e/install-action@nextest

      - name: Run Tests
        run: cargo nextest run --workspace
