[package]
name = "peregrine-sui-move-analyzer-mcp-server"
version.workspace = true
edition.workspace = true
license.workspace = true

[lib]
name = "peregrine_sui_move_analyzer_mcp_server"
path = "src/lib.rs"
doctest = false

[[bin]]
name = "peregrine-sui-move-analyzer-mcp-server"
path = "src/main.rs"

[lints]
workspace = true

[dependencies]
anyhow = { workspace = true }
peregrine-helper-protocol = { workspace = true }
peregrine-sui-move-analyzer = { workspace = true }
peregrine-sui-move-analyzer-mcp-protocol = { workspace = true }
rmcp = { workspace = true, default-features = false, features = [
    "server",
    "transport-io",
] }
serde = { workspace = true, features = ["derive"] }
serde_json = { workspace = true }
tokio = { workspace = true, features = [
    "io-std",
    "io-util",
    "macros",
    "process",
    "rt-multi-thread",
    "sync",
    "time",
] }
url = { workspace = true }

[dev-dependencies]
tempfile = { workspace = true }
